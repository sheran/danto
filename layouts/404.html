<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - {{ site.Title }}</title>
  <meta name="description" content="Page not found">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <script>
    (function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark-mode');
        document.documentElement.setAttribute('dark', '');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
</head>
<body class="bg-theme text-theme">
  <a href="#main-content" class="skip-link">Skip to content</a>
  {{ partial "header.html" . }}
  {{ partial "search.html" . }}

  <main id="main-content" class="content" aria-label="Content">
    <section class="text-center py-20 px-4">
      <h1 class="text-[80px] sm:text-[100px] md:text-[160px] font-serif font-bold text-theme-heading leading-none mb-4">404</h1>
      <p class="text-theme-alt text-lg md:text-xl mb-8">Oops! The page you're looking for doesn't exist.</p>
      <a href="{{ "/" | relURL }}" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-[var(--btn-bg)] text-[var(--btn-color)] hover:bg-[var(--btn-hover)] font-semibold transition-base">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Back to Home
      </a>
    </section>
  </main>

  <!-- Minimal footer: copyright + toggle + back-to-top only -->
  <footer class="bg-theme-alt border-t border-theme">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="py-5 flex flex-wrap items-center justify-between gap-4">
        <p class="text-theme-alt text-sm">&copy; {{ now.Year }} {{ site.Title }}. All rights reserved.</p>
        <div class="flex items-center gap-4">
          <button id="toggle-theme" type="button" class="flex items-center gap-1.5 cursor-pointer text-theme-heading hover:text-theme-primary transition-base select-none bg-transparent border-0 p-0" aria-label="Toggle dark mode">
            <div class="toggle-moon flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              <span class="text-sm font-medium">Dark</span>
            </div>
            <div class="toggle-sun flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <span class="text-sm font-medium">Light</span>
            </div>
          </button>
          <div id="back-to-top" class="flex items-center gap-1.5 cursor-pointer text-theme-heading hover:text-theme-primary transition-base select-none text-sm font-medium underline decoration-transparent hover:decoration-current" role="button" tabindex="0" aria-label="Back to top">
            <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
            <span>Back to top</span>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script>
  (function() {
    // Dark/Light mode toggle
    var toggle = document.getElementById('toggle-theme');
    if (toggle) {
      function setTheme(isDark) {
        if (isDark) {
          document.documentElement.classList.add('dark-mode');
          document.documentElement.setAttribute('dark', '');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark-mode');
          document.documentElement.removeAttribute('dark');
          localStorage.setItem('theme', 'light');
        }
      }
      toggle.addEventListener('click', function() {
        var isDark = !document.documentElement.classList.contains('dark-mode');
        setTheme(isDark);
      });
    }

    // Back to top
    var btn = document.getElementById('back-to-top');
    if (btn) {
      btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      btn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }
  })();
  </script>
</body>
</html>
